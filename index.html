<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Futurepedia – The world's largest AI tools directory. Find all our links here.">
  <title>Futurepedia | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:              #04040f;
      --cyan:            #00d4ff;
      --purple:          #7c3aed;
      --node-bg:         rgba(6, 8, 28, 0.90);
      --node-border:     rgba(0, 212, 255, 0.28);
      --node-border-h:   rgba(0, 212, 255, 0.95);
      --glow-cyan:       rgba(0, 212, 255, 0.18);
      --center-size:     148px;
      --node-size:       112px;
      --font:            'Inter', system-ui, -apple-system, sans-serif;
      --ease:            0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: #c4d4f0;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       BACKGROUND GRADIENT
    ================================================================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 55% at 50% 50%, rgba(10, 10, 40, 0.9) 0%, transparent 100%),
        radial-gradient(ellipse 30% 30% at 20% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 30% 30% at 80% 20%, rgba(0, 212, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ================================================================
       LAYER 0 — Ambient particle canvas
    ================================================================ */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ================================================================
       LAYER 1 — SVG connection lines + pulse dots
    ================================================================ */
    #network-svg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }

    .conn-line {
      stroke: rgba(0, 212, 255, 0.16);
      stroke-width: 1.5;
      stroke-dasharray: 5 9;
      transition:
        stroke 0.35s ease,
        stroke-width 0.35s ease,
        filter 0.35s ease;
    }

    .conn-line.active {
      stroke: rgba(0, 212, 255, 0.82);
      stroke-width: 2;
      stroke-dasharray: none;
      filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.65));
    }

    .pulse-dot {
      fill: rgba(255, 255, 255, 0.95);
      filter: drop-shadow(0 0 4px rgba(0, 212, 255, 1));
      pointer-events: none;
    }

    /* ================================================================
       LAYER 2 — Interactive nodes
    ================================================================ */
    #network-container {
      position: fixed;
      inset: 0;
      z-index: 3;
    }

    /* --- Shared node base --- */
    .node {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      background: var(--node-bg);
      border: 1.5px solid var(--node-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-decoration: none;
      color: #c4d4f0;
      user-select: none;
    }

    /* --- Float animation (standalone translate — composes with transform) --- */
    @keyframes float {
      0%, 100% { translate: 0 0px; }
      50%       { translate: 0 -7px; }
    }

    /* ================================================================
       CENTER NODE
    ================================================================ */
    #center-node {
      width: var(--center-size);
      height: var(--center-size);
      transform: translate(-50%, -50%);
      border-color: rgba(0, 212, 255, 0.45);
      cursor: default;
      z-index: 10;
      animation: center-breathe 3.5s ease-in-out infinite;
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.08),
        0 0 40px rgba(0, 212, 255, 0.10),
        0 0 80px rgba(124, 58, 237, 0.08),
        inset 0 0 30px rgba(0, 212, 255, 0.04);
    }

    @keyframes center-breathe {
      0%, 100% {
        translate: 0 0px;
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.08),
          0 0 40px rgba(0, 212, 255, 0.10),
          0 0 80px rgba(124, 58, 237, 0.08),
          inset 0 0 30px rgba(0, 212, 255, 0.04);
      }
      50% {
        translate: 0 -5px;
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.18),
          0 0 55px rgba(0, 212, 255, 0.20),
          0 0 110px rgba(124, 58, 237, 0.14),
          inset 0 0 30px rgba(0, 212, 255, 0.07);
      }
    }

    /* Outer pulse rings */
    #center-node::before,
    #center-node::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0, 212, 255, 0.22);
      animation: ring-expand 2.8s ease-out infinite;
      pointer-events: none;
    }
    #center-node::before { inset: -12px; animation-delay: 0s; }
    #center-node::after  { inset: -26px; animation-delay: 0.5s; border-color: rgba(0, 212, 255, 0.10); }

    @keyframes ring-expand {
      0%   { transform: scale(0.96); opacity: 0.8; }
      60%  { transform: scale(1.04); opacity: 0.5; }
      100% { transform: scale(1.08); opacity: 0; }
    }

    .center-icon {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cyan);
      text-align: center;
      line-height: 1;
    }

    /* ================================================================
       LINK NODES
    ================================================================ */
    .link-node {
      width: var(--node-size);
      height: var(--node-size);
      /* JS sets --tx and --ty in px */
      transform: translate(calc(-50% + var(--tx, 0px)), calc(-50% + var(--ty, 0px)));
      cursor: pointer;
      animation: float 4s ease-in-out infinite;
      transition:
        transform var(--ease),
        border-color var(--ease),
        box-shadow var(--ease);
    }

    .link-node:hover,
    .link-node:focus-visible {
      outline: none;
      transform: translate(calc(-50% + var(--tx, 0px)), calc(-50% + var(--ty, 0px))) scale(1.14);
      border-color: var(--node-accent, var(--node-border-h));
      box-shadow:
        0 0 22px var(--node-glow, var(--glow-cyan)),
        0 0 60px var(--node-glow, var(--glow-cyan)),
        inset 0 0 18px rgba(255, 255, 255, 0.025);
    }

    .node-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .node-icon svg { width: 100%; height: 100%; }

    .node-label {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-align: center;
      color: rgba(196, 212, 240, 0.75);
      padding: 0 8px;
      line-height: 1.3;
    }

    /* ================================================================
       MOBILE NAV  (shown ≤ 640px)
    ================================================================ */
    #mobile-nav {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 3rem 1.25rem 2.5rem;
      overflow-y: auto;
      position: relative;
      z-index: 10;
    }

    .mob-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 2.2rem;
    }

    .mob-logo {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--node-bg);
      border: 1.5px solid rgba(0, 212, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.14), 0 0 70px rgba(124, 58, 237, 0.08);
    }

    .mob-header h1 {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .mob-header p {
      font-size: 0.7rem;
      color: rgba(196, 212, 240, 0.4);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #mobile-nav ul {
      list-style: none;
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    #mobile-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      background: var(--node-bg);
      border: 1.5px solid rgba(0, 212, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #c4d4f0;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition:
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        transform 0.22s ease;
    }

    #mobile-nav a:hover,
    #mobile-nav a:active {
      border-color: rgba(0, 212, 255, 0.65);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.12);
      transform: translateX(5px);
    }

    .mob-icon {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mob-icon svg { width: 100%; height: 100%; }

    /* ================================================================
       RESPONSIVE BREAKPOINT
    ================================================================ */
    @media (max-width: 640px) {
      html, body { overflow: auto; }

      #network-svg,
      #network-container { display: none; }

      #mobile-nav { display: flex; }
    }
  </style>
</head>

  <script>
    'use strict';

    /* ── CONFIG ─────────────────────────────────────────────────── */
    const NODES = [
      { id: 'youtube',    label: 'YouTube'         },
      { id: 'website',    label: 'Website'         },
      { id: 'newsletter', label: 'Newsletter'      },
      { id: 'instagram',  label: 'Instagram'       },
      { id: 'twitter',    label: 'Twitter'         },
      { id: 'skillleap',  label: 'Skill Leap AI'  },
    ];
    const ANGLE_OFFSET = -Math.PI / 2; // start at 12 o'clock

    /* orbit radius scales with viewport, capped so nodes never clip */
    function orbitRadius() {
      return Math.min(Math.min(window.innerWidth, window.innerHeight) * 0.315, 270);
    }

    /* center world coords — updated by positionNodes() */
    let centerX = 0, centerY = 0;

    /* ── NODE POSITIONING ───────────────────────────────────────── */
    function positionNodes() {
      centerX = window.innerWidth  / 2;
      centerY = window.innerHeight / 2;
      const R = orbitRadius();
      const N = NODES.length;

      NODES.forEach((nd, i) => {
        const angle = ANGLE_OFFSET + (2 * Math.PI * i) / N;
        const tx    = Math.cos(angle) * R;
        const ty    = Math.sin(angle) * R;

        const el = document.getElementById(`node-${nd.id}`);
        if (!el) return;

        el.style.setProperty('--tx', `${tx}px`);
        el.style.setProperty('--ty', `${ty}px`);
        el.style.animationDelay = `${(i * 0.55).toFixed(2)}s`;

        nd._wx = centerX + tx;   // world X
        nd._wy = centerY + ty;   // world Y
      });

      updateLines();
    }

    /* ── SVG LINES ──────────────────────────────────────────────── */
    function updateLines() {
      NODES.forEach(nd => {
        const ln = document.getElementById(`line-${nd.id}`);
        if (!ln || nd._wx === undefined) return;
        ln.setAttribute('x1', centerX);
        ln.setAttribute('y1', centerY);
        ln.setAttribute('x2', nd._wx);
        ln.setAttribute('y2', nd._wy);
      });
    }

    /* ── PULSE ANIMATION ────────────────────────────────────────── */
    const pulses = NODES.map((nd, i) => ({
      nd,
      t:         (i / NODES.length),           // staggered start
      speed:     0.0033 + i * 0.00015,         // slight speed variation
      dir:       1,                             // 1 = outward, -1 = inward
    }));

    function tickPulses() {
      pulses.forEach(p => {
        p.t += p.speed * p.dir;
        if (p.t >= 1) { p.t = 1; p.dir = -1; }
        if (p.t <= 0) { p.t = 0; p.dir =  1; }

        const dot = document.getElementById(`pulse-${p.nd.id}`);
        if (!dot || p.nd._wx === undefined) return;

        dot.setAttribute('cx', centerX + (p.nd._wx - centerX) * p.t);
        dot.setAttribute('cy', centerY + (p.nd._wy - centerY) * p.t);
        // sine fade: emerges from center, dissolves at node
        dot.style.opacity = (Math.sin(p.t * Math.PI) * 0.88).toFixed(3);
      });

      requestAnimationFrame(tickPulses);
    }

    /* ── HOVER — highlight matching line ────────────────────────── */
    function setupHover() {
      NODES.forEach(nd => {
        const el = document.getElementById(`node-${nd.id}`);
        const ln = document.getElementById(`line-${nd.id}`);
        if (!el || !ln) return;
        el.addEventListener('mouseenter', () => ln.classList.add('active'));
        el.addEventListener('mouseleave', () => ln.classList.remove('active'));
        el.addEventListener('focus',      () => ln.classList.add('active'));
        el.addEventListener('blur',       () => ln.classList.remove('active'));
      });
    }

    /* ── BACKGROUND PARTICLE CANVAS ─────────────────────────────── */
    function initParticles() {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');
      const N      = 58;
      const LINK   = 125;

      const resize = () => {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      };
      resize();
      window.addEventListener('resize', resize);

      const pts = Array.from({ length: N }, () => ({
        x:  Math.random() * canvas.width,
        y:  Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.22,
        vy: (Math.random() - 0.5) * 0.22,
        r:  Math.random() * 1.1 + 0.4,
      }));

      const draw = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const p of pts) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0)              p.x = canvas.width;
          if (p.x > canvas.width)   p.x = 0;
          if (p.y < 0)              p.y = canvas.height;
          if (p.y > canvas.height)  p.y = 0;
        }

        /* connections */
        for (let i = 0; i < pts.length; i++) {
          for (let j = i + 1; j < pts.length; j++) {
            const dx   = pts[i].x - pts[j].x;
            const dy   = pts[i].y - pts[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < LINK) {
              ctx.strokeStyle = `rgba(0,212,255,${((1 - dist / LINK) * 0.1).toFixed(3)})`;
              ctx.lineWidth   = 0.5;
              ctx.beginPath();
              ctx.moveTo(pts[i].x, pts[i].y);
              ctx.lineTo(pts[j].x, pts[j].y);
              ctx.stroke();
            }
          }
        }

        /* dots */
        ctx.fillStyle = 'rgba(0,212,255,0.32)';
        for (const p of pts) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(draw);
      };

      draw();
    }

    /* ── INIT ───────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      initParticles();
      positionNodes();
      setupHover();
      requestAnimationFrame(tickPulses);

      /* debounced resize */
      let rTimer;
      window.addEventListener('resize', () => {
        clearTimeout(rTimer);
        rTimer = setTimeout(positionNodes, 80);
      });
    });
  </script>
